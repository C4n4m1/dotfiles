input {
    kb_options = caps:swapescape
}
# title bar
#
# windowrule = workspace special, class:org.gnome.clocks


# Ulauncher
# windowrule = noblur, class:(ulauncher)

# GTK
# windowrule = blur,class:^(gtk).*$
windowrule = opacity 0.98, class:^(gtk).*$
decoration {
   blur {
    enabled = true
    size = 8
    passes = 1
    new_optimizations = yes
    ignore_opacity=true
    }
}

windowrule = opacity 0.8, class:^(albert).*$
decoration {
   blur {
    enabled = true
    size = 8
    passes = 1
    new_optimizations = yes
    ignore_opacity=true
    }
}

general {
    col.active_border = rgba(7941ccee) rgba(ff0000ff) rgba(00ff00ff) 45deg
    col.inactive_border = rgba(000000ff)
}

animation = borderangle, 1, 100, linear, loop
