# Setup XDG for screen sharing and start waypaper and waybar
exec-once = ~/.config/hypr/scripts/xdg.sh
exec-once = "setxkbmap fr"

# Load Wallpaper
exec-once = ~/.config/hypr/scripts/wallpaper-restore.sh

# Load eww status bar
# exec-once = eww daemon
exec-once = eww open bar

exec-once = copyq
exec = albert
exec-once = kdeconnect-indicator
exec-once = nm-applet
# exec-once = /home/credo/.config/eww/scripts/bluetooth_systray.sh
exec-once = blueman-applet
exec-once = swayosd-server --top-margin=0.05

# Start Polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Load Notification Daemon
# exec-once = ~/.config/ml4w/settings/notification.sh
# exec-once = dunst
exec-once = pkill dunst
exec-once = usr/bin/lua /home/credo/.config/astal/notifs/init.lua
exec = /usr/bin/swayosd-server --top-margin 0.05


# Load GTK settings
# exec-once = ~/.config/hypr/scripts/gtk.sh

# Using hypridle to start hyprlock
exec-once = hypridle

# Load cliphist history
# exec-once = wl-paste --watch cliphist store

# Autostart ML4W App
exec-once = ~/.config/ml4w/scripts/ml4w-autostart.sh

# Start ags
# exec-once = ~/.config/ml4w/scripts/ags.sh

# Start autostart cleanup
exec-once = ~/.config/hypr/scripts/cleanup.sh

# Load configuration from ML4W Hyprland Settings App
exec = ~/.config/ml4w-hyprland-settings/hyprctl.sh

# Dock
# exec-once = ~/.config/nwg-dock-hyprland/launch.sh

exec-once = [workspacespecial] gnome-clocks
